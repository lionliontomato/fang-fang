<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>慌慌歌單</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="style.css?v=2026060906" rel="stylesheet"/>

<style>
body{
  background:
    radial-gradient(circle at 12% 14%, rgba(255,255,255,.95), transparent 18%),
    radial-gradient(circle at 88% 16%, rgba(203,216,223,.95), transparent 26%),
    radial-gradient(circle at 16% 78%, rgba(111,135,149,.34), transparent 34%),
    radial-gradient(circle at 84% 82%, rgba(216,180,160,.16), transparent 30%),
    radial-gradient(circle at 50% 45%, rgba(255,255,255,.55), transparent 24%),
    linear-gradient(135deg,#eef4f6 0%,#dbe5e9 30%,#c7d6de 58%,#d9e4e8 78%,#f6f2ea 100%) !important;
}

.bg-art{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.55;
  background-image:
    linear-gradient(rgba(255,255,255,.32) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.24) 1px, transparent 1px);
  background-size:42px 42px;
}

.bg-art::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(ellipse at 16% 24%, rgba(64,89,105,.18), transparent 28%),
    radial-gradient(ellipse at 82% 28%, rgba(64,89,105,.12), transparent 25%),
    radial-gradient(ellipse at 26% 82%, rgba(64,89,105,.11), transparent 26%),
    radial-gradient(ellipse at 76% 78%, rgba(216,180,160,.14), transparent 28%);
  filter:blur(34px);
}

.bg-art::after{
  content:"雲　山　風　月　花";
  position:absolute;
  left:-10%;
  top:31%;
  width:120%;
  text-align:center;
  color:rgba(64,89,105,.20);
  font-family:'Noto Serif TC',serif;
  font-size:clamp(56px,8vw,136px);
  letter-spacing:58px;
  transform:rotate(-12deg);
  white-space:nowrap;
}

.bg-symbols{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.bg-symbols span{
  position:absolute;
  color:rgba(64,89,105,.22);
  font-family:'Noto Serif TC',serif;
  font-size:clamp(40px,5.5vw,92px);
}

.bg-symbols span:nth-child(1){left:8%;top:18%;transform:rotate(-18deg)}
.bg-symbols span:nth-child(2){right:10%;top:22%;transform:rotate(16deg)}
.bg-symbols span:nth-child(3){left:12%;bottom:18%;transform:rotate(12deg)}
.bg-symbols span:nth-child(4){right:14%;bottom:16%;transform:rotate(-12deg)}
.bg-symbols span:nth-child(5){left:47%;top:10%;transform:rotate(8deg);opacity:.7}
.bg-symbols span:nth-child(6){left:52%;bottom:10%;transform:rotate(-10deg);opacity:.65}

body::before,
body::after{
  content:none !important;
}
</style>
</head>

<body>
<div class="bg-art"></div>
<div class="bg-symbols">
  <span>花</span>
  <span>月</span>
  <span>雲</span>
  <span>風</span>
  <span>山</span>
  <span>詩</span>
</div>

<div class="float-layer" id="floatLayer"></div>

<main class="wrap">
<section class="hero">
<span class="eyebrow"> ♫</span>
<h1>慌慌の歌單</h1>
<p>走過路過歡迎一起來聽首歌吧。</p>

<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn" type="button">🎲 隨機抽歌</button>
</div>

<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>

<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2>🌸 慌慌推薦</h2>
    <div class="big" id="pickSong"></div>
    <div id="pickArtist"></div>
    <button class="close" id="closeModal" type="button">謝謝尼的瓜單啊！</button>
  </div>
</div>

<script src="./script.js?v=1004"></script>
</body>
</html>
