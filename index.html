<!DOCTYPE html>
<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>慌慌歌單｜Morandi Blue Playlist</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&amp;family=Zen+Maru+Gothic:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<link href="style.css" rel="stylesheet"/></head>
<body>
<div class="float-layer" id="floatLayer"></div>
<main class="wrap">
<section class="hero">
<span class="eyebrow">Morandi Blue Playlist ♫</span>
<h1>慌慌歌單</h1>
<p>連動 Google 試算表：歌曲讀取 A 欄歌名、B 欄歌手、C 欄分類；分類按鈕讀取 F 欄標籤。新增或刪除資料後重新整理網頁就會同步。</p>
<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn">🎲 隨機抽歌</button>
</div>
<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>
<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>
</main>
<div class="modal" id="modal"><div class="modal-card"><h2>🎲 今日推薦</h2><div class="big" id="pickSong"></div><div id="pickArtist"></div><button class="close" id="closeModal">好，收下！</button></div></div>

<script src="script.js"></script></body>
</html>
