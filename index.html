<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>慌慌歌單</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="style.css?v=20260609" rel="stylesheet"/>

<style>
body{
  background:
    radial-gradient(circle at 8% 12%, rgba(255,255,255,.95), transparent 20%),
    radial-gradient(circle at 90% 15%, rgba(203,216,223,.95), transparent 28%),
    radial-gradient(circle at 18% 78%, rgba(111,135,149,.30), transparent 32%),
    radial-gradient(circle at 82% 80%, rgba(216,180,160,.22), transparent 28%),
    radial-gradient(circle at 52% 42%, rgba(255,255,255,.55), transparent 22%),
    radial-gradient(circle at 38% 62%, rgba(203,216,223,.42), transparent 26%),
    linear-gradient(135deg,#eef4f6 0%,#dbe5e9 28%,#c7d6de 55%,#d9e4e8 78%,#f6f2ea 100%) !important;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.34) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.28) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 88%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.30), transparent 10%),
    radial-gradient(circle at 75% 32%, rgba(255,255,255,.24), transparent 12%),
    radial-gradient(circle at 60% 75%, rgba(255,255,255,.20), transparent 10%);
  filter:blur(35px);
}
</style>
</head>

<body>
<div class="float-layer" id="floatLayer"></div>
<main class="wrap">
<section class="hero">
<span class="eyebrow"> ♫</span>
<h1>慌慌の歌單</h1>
<p>走過路過歡迎一起來聽首歌吧。</p>
<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn" type="button">🎲 隨機抽歌</button>
</div>
<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>
<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>
</main>
<div class="modal" id="modal"><div class="modal-card"><h2>🌸 慌慌推薦</h2><div class="big" id="pickSong"></div><div id="pickArtist"></div><button class="close" id="closeModal" type="button">謝謝尼的瓜單啊！</button></div></div>

<script src="./script.js?v=1004"></script>
</body>
</html>
