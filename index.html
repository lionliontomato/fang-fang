<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>慌慌歌單</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="style.css?v=2026060908" rel="stylesheet"/>

<style>
body{
  background:
    radial-gradient(circle at 12% 12%, rgba(255,255,255,.96), transparent 18%),
    radial-gradient(circle at 88% 14%, rgba(203,216,223,.95), transparent 24%),
    radial-gradient(circle at 12% 80%, rgba(111,135,149,.28), transparent 30%),
    radial-gradient(circle at 86% 82%, rgba(216,180,160,.16), transparent 28%),
    linear-gradient(135deg,#eef4f6 0%,#dbe5e9 32%,#c7d6de 60%,#f6f2ea 100%) !important;
}

.bg-art{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
  background-image:
    linear-gradient(rgba(255,255,255,.28) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.22) 1px, transparent 1px);
  background-size:44px 44px;
}

.bg-art::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(ellipse at 10% 22%, rgba(64,89,105,.18), transparent 28%),
    radial-gradient(ellipse at 88% 28%, rgba(64,89,105,.13), transparent 24%),
    radial-gradient(ellipse at 18% 86%, rgba(64,89,105,.13), transparent 26%),
    radial-gradient(ellipse at 78% 78%, rgba(216,180,160,.13), transparent 28%);
  filter:blur(40px);
}

.bg-art::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 0% 70%, rgba(64,89,105,.16) 0%, rgba(64,89,105,.08) 18%, transparent 34%),
    radial-gradient(ellipse at 100% 72%, rgba(64,89,105,.14) 0%, rgba(64,89,105,.07) 18%, transparent 34%),
    radial-gradient(ellipse at 50% 98%, rgba(64,89,105,.10) 0%, transparent 28%);
  filter:blur(12px);
}

.left-branch{
  position:fixed;
  left:-40px;
  top:52px;
  width:310px;
  height:210px;
  pointer-events:none;
  z-index:0;
  opacity:.55;
  transform:rotate(-12deg);
}

.left-branch::before{
  content:"";
  position:absolute;
  left:20px;
  top:92px;
  width:280px;
  height:2px;
  background:rgba(64,89,105,.22);
  transform:rotate(-18deg);
  transform-origin:left center;
}

.left-branch span{
  position:absolute;
  width:22px;
  height:22px;
  border-radius:56% 44% 58% 42%;
  background:rgba(248,245,239,.72);
  border:1px solid rgba(64,89,105,.10);
  box-shadow:0 0 0 6px rgba(216,180,160,.08);
}

.left-branch span:nth-child(1){left:44px;top:78px}
.left-branch span:nth-child(2){left:92px;top:55px}
.left-branch span:nth-child(3){left:138px;top:43px}
.left-branch span:nth-child(4){left:184px;top:30px}
.left-branch span:nth-child(5){left:226px;top:16px}

.cloud-lines{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.55;
  background:
    radial-gradient(ellipse at 14% 58%, transparent 58%, rgba(216,180,160,.22) 59%, transparent 61%),
    radial-gradient(ellipse at 88% 42%, transparent 58%, rgba(216,180,160,.18) 59%, transparent 61%),
    radial-gradient(ellipse at 74% 70%, transparent 58%, rgba(216,180,160,.16) 59%, transparent 61%);
}

.badminton-bg{
  position:fixed;
  pointer-events:none;
  z-index:0;
  opacity:.46;
}

.badminton-bg.racket{
  right:-42px;
  top:82px;
  width:210px;
  height:210px;
  border:3px solid rgba(64,89,105,.18);
  border-radius:50%;
  transform:rotate(-28deg);
}

.badminton-bg.racket::before{
  content:"";
  position:absolute;
  left:50%;
  top:100%;
  width:3px;
  height:170px;
  background:rgba(64,89,105,.16);
  transform:translateX(-50%);
}

.badminton-bg.racket::after{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:50%;
  background-image:
    linear-gradient(rgba(64,89,105,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(64,89,105,.12) 1px, transparent 1px);
  background-size:18px 18px;
  mask-image:radial-gradient(circle, black 66%, transparent 68%);
}

.badminton-bg.shuttle{
  left:22px;
  bottom:70px;
  width:110px;
  height:70px;
  transform:rotate(-22deg);
  opacity:.62;
}

.badminton-bg.shuttle::before{
  content:"";
  position:absolute;
  left:0;
  top:22px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(248,245,239,.86);
  border:1px solid rgba(64,89,105,.18);
}

.badminton-bg.shuttle::after{
  content:"";
  position:absolute;
  left:32px;
  top:0;
  width:78px;
  height:70px;
  background:
    linear-gradient(70deg, transparent 45%, rgba(64,89,105,.18) 46%, transparent 48%),
    linear-gradient(90deg, transparent 45%, rgba(64,89,105,.16) 46%, transparent 48%),
    linear-gradient(110deg, transparent 45%, rgba(64,89,105,.18) 46%, transparent 48%),
    radial-gradient(ellipse at left center, rgba(248,245,239,.75), transparent 72%);
  clip-path:polygon(0 36%,100% 0,82% 100%,0 64%);
}

.corner-fan{
  position:fixed;
  right:-95px;
  bottom:-95px;
  width:370px;
  height:370px;
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  opacity:.75;
  background:
    radial-gradient(circle, transparent 57%, rgba(64,89,105,.08) 59%, transparent 61%);
}

.corner-fan::before{
  content:"";
  position:absolute;
  inset:32px;
  border-radius:50%;
  border:1px solid rgba(64,89,105,.08);
}

.corner-fan::after{
  content:"";
  position:absolute;
  inset:66px;
  border-radius:50%;
  border:1px solid rgba(64,89,105,.05);
}

body::before,
body::after{
  content:none !important;
}
</style>
</head>

<body>
<div class="bg-art"></div>
<div class="left-branch">
  <span></span><span></span><span></span><span></span><span></span>
</div>
<div class="cloud-lines"></div>
<div class="badminton-bg racket"></div>
<div class="badminton-bg shuttle"></div>
<div class="corner-fan"></div>

<div class="float-layer" id="floatLayer"></div>

<main class="wrap">
<section class="hero">
<span class="eyebrow"> ♫</span>
<h1>慌慌の歌單</h1>
<p>走過路過歡迎一起來聽首歌吧。</p>

<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn" type="button">🎲 隨機抽歌</button>
</div>

<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>

<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2>🌸 慌慌推薦</h2>
    <div class="big" id="pickSong"></div>
    <div id="pickArtist"></div>
    <button class="close" id="closeModal" type="button">謝謝尼的瓜單啊！</button>
  </div>
</div>

<script src="./script.js?v=1004"></script>
</body>
</html>
