<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>慌慌歌單</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="style.css?v=2026060904" rel="stylesheet"/>

<style>
body{
  background:
    radial-gradient(circle at 10% 12%, rgba(255,255,255,.95), transparent 18%),
    radial-gradient(circle at 90% 15%, rgba(203,216,223,.95), transparent 25%),
    radial-gradient(circle at 18% 78%, rgba(111,135,149,.35), transparent 32%),
    radial-gradient(circle at 82% 80%, rgba(216,180,160,.24), transparent 30%),
    radial-gradient(circle at 50% 42%, rgba(255,255,255,.55), transparent 23%),
    radial-gradient(circle at 38% 62%, rgba(203,216,223,.45), transparent 28%),
    linear-gradient(135deg,#eef4f6 0%,#dbe5e9 28%,#c7d6de 55%,#d9e4e8 78%,#f6f2ea 100%) !important;
}

.bg-art{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.24;
  background-image:
    linear-gradient(rgba(255,255,255,.34) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.26) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.72),transparent 88%);
}

.bg-art::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 18% 24%, rgba(64,89,105,.12), transparent 28%),
    radial-gradient(ellipse at 82% 30%, rgba(64,89,105,.09), transparent 24%),
    radial-gradient(ellipse at 28% 82%, rgba(64,89,105,.08), transparent 26%),
    radial-gradient(ellipse at 76% 78%, rgba(216,180,160,.16), transparent 28%);
  filter:blur(28px);
}

.bg-art::after{
  content:"羽　　風　　雲　　花　　羽";
  position:absolute;
  left:-8%;
  top:34%;
  width:120%;
  text-align:center;
  color:rgba(64,89,105,.13);
  font-family:'Noto Serif TC',serif;
  font-size:clamp(48px,7vw,110px);
  letter-spacing:46px;
  transform:rotate(-12deg);
  white-space:nowrap;
}

.bg-symbols{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.bg-symbols span{
  position:absolute;
  color:rgba(64,89,105,.16);
  font-size:clamp(34px,5vw,78px);
  filter:blur(.15px);
}

.bg-symbols span:nth-child(1){left:7%;top:18%;transform:rotate(-18deg)}
.bg-symbols span:nth-child(2){right:10%;top:22%;transform:rotate(16deg)}
.bg-symbols span:nth-child(3){left:14%;bottom:18%;transform:rotate(12deg)}
.bg-symbols span:nth-child(4){right:16%;bottom:16%;transform:rotate(-12deg)}
.bg-symbols span:nth-child(5){left:48%;top:12%;transform:rotate(8deg);opacity:.65}
.bg-symbols span:nth-child(6){left:54%;bottom:10%;transform:rotate(-10deg);opacity:.6}

body::before,
body::after{
  content:none !important;
}
</style>
</head>

<body>
<div class="bg-art"></div>
<div class="bg-symbols">
  <span>🪶</span>
  <span>🏸</span>
  <span>❀</span>
  <span>🪶</span>
  <span>🏸</span>
  <span>❀</span>
</div>

<div class="float-layer" id="floatLayer"></div>

<main class="wrap">
<section class="hero">
<span class="eyebrow"> ♫</span>
<h1>慌慌の歌單</h1>
<p>走過路過歡迎一起來聽首歌吧。</p>

<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn" type="button">🎲 隨機抽歌</button>
</div>

<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>

<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2>🌸 慌慌推薦</h2>
    <div class="big" id="pickSong"></div>
    <div id="pickArtist"></div>
    <button class="close" id="closeModal" type="button">謝謝尼的瓜單啊！</button>
  </div>
</div>

<script src="./script.js?v=1004"></script>
</body>
</html>
